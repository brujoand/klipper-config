[include mcu/AFC_Lite.cfg]

[mcu Tindturtle]
#canbus_uuid: <replace with your can UUID>
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_2A000B001751323532363237-if00

[AFC_BoxTurtle Tindturtle]
hub: Tindturtle
extruder: extruder
enable_assist: True        # Setting to True enables espooler assist while printing
enable_kick_start: True    # Setting to True enables full speed espoolers for kick_start_time(0.070 ms default) amount
# buffer: <buffer_name> # If not defined below from the install script, uncomment and add buffer name if using a buffer

[temperature_sensor Tindturtle]
sensor_type: temperature_mcu
sensor_mcu: Tindturtle

[AFC_stepper lane1]
unit: Tindturtle:1
step_pin: Tindturtle:M1_STEP
dir_pin: !Tindturtle:M1_DIR
enable_pin: !Tindturtle:M1_EN
microsteps: 16
rotation_distance: 4.65
dist_hub: 195.0 
park_dist: 10
led_index: AFC_Indicator:1
afc_motor_rwd: Tindturtle:MOT1_FWD
afc_motor_fwd: Tindturtle:MOT1_RWD
afc_motor_enb: Tindturtle:MOT1_EN
rwd_speed_multiplier: 0.5
fwd_speed_multiplier: 0.5
pwm: True
hardware_pwm: True
prep: ^!Tindturtle:TRG1
load: ^Tindturtle:EXT1

[tmc2209 AFC_stepper lane1]
uart_pin: Tindturtle:M1_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_stepper lane2]
unit: Tindturtle:2
step_pin: Tindturtle:M2_STEP
dir_pin: !Tindturtle:M2_DIR
enable_pin: !Tindturtle:M2_EN
microsteps: 16
rotation_distance: 4.65
dist_hub: 125.0 
park_dist: 10
led_index: AFC_Indicator:2
afc_motor_rwd: Tindturtle:MOT2_FWD
afc_motor_fwd: Tindturtle:MOT2_RWD
afc_motor_enb: Tindturtle:MOT2_EN
rwd_speed_multiplier: 0.5
fwd_speed_multiplier: 0.5
pwm: True
hardware_pwm: True
prep: ^!Tindturtle:TRG2
load: ^Tindturtle:EXT2

[tmc2209 AFC_stepper lane2]
uart_pin: Tindturtle:M2_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_stepper lane3]
unit: Tindturtle:3
step_pin: Tindturtle:M3_STEP
dir_pin: !Tindturtle:M3_DIR
enable_pin: !Tindturtle:M3_EN
microsteps: 16
rotation_distance: 4.65
dist_hub: 125.0 
park_dist: 10
led_index: AFC_Indicator:3
afc_motor_rwd: Tindturtle:MOT3_FWD
afc_motor_fwd: Tindturtle:MOT3_RWD
afc_motor_enb: Tindturtle:MOT3_EN
rwd_speed_multiplier: 0.5
fwd_speed_multiplier: 0.5
pwm: True
hardware_pwm: True
prep: ^!Tindturtle:TRG3
