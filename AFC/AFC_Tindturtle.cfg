sense_resistor: 0.110

[AFC_stepper lane4]
unit: Tindturtle:4
step_pin: Tindturtle:M4_STEP
dir_pin: !Tindturtle:M4_DIR
enable_pin: !Tindturtle:M4_EN
microsteps: 16
rotation_distance: 4.65
dist_hub: 190.0 
park_dist: 10
led_index: AFC_Indicator:4
afc_motor_rwd: Tindturtle:MOT4_FWD
afc_motor_fwd: Tindturtle:MOT4_RWD
